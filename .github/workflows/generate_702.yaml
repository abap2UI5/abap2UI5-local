name: generate_702

# Rebuilds the 702 branch: takes the standard branch static files, merges the
# sources from input/ on main into the locals_imp include, downports the
# result with abaplint and publishes the branch content as exactly ONE commit
# on top of the current main head (force push). The branch therefore always
# shows "1 commit ahead" of main and never behind.

on:
  workflow_dispatch:
  push:
    branches: [main]
  workflow_run:
    workflows: [update_input]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: generate_702
  cancel-in-progress: false

jobs:
  generate_702:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main (tooling + input)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout standard branch (static files)
        uses: actions/checkout@v4
        with:
          ref: standard
          path: work

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: version
        run: echo "version=$(grep -oP "VALUE \`\K[0-9.]+" main/input/02/z2ui5_if_app.intf.abap)" >> "$GITHUB_OUTPUT"

      - name: Build merged handler class from input
        run: python3 main/.github/scripts/build_locals_imp.py main/input /tmp/locals_imp.abap

      - name: Downport and lint branch content
        run: |
          cp /tmp/locals_imp.abap work/src/z2ui5_cl_abap2ui5_local.clas.locals_imp.abap
          sed 's/{{VERSION}}/${{ steps.version.outputs.version }}/g' main/.github/readme/702.md > work/README.md
          cd work
          npm ci
          npm run downport
          # the downport rewrite can leave indentation-only lines behind;
          # abapGit strips trailing blanks on pull, so drop them here to keep
          # the pulled state identical to the branch content
          find src -name '*.abap' -exec sed -i 's/[ \t]*$//' {} +
          npx abaplint

      - name: Push as single commit on top of main
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          parent=$(git -C main rev-parse HEAD)
          cd work
          git fetch --no-tags --depth=1 origin "$parent"
          git fetch --no-tags --depth=2 origin '+refs/heads/702:refs/remotes/origin/702' || true
          git add -A
          tree=$(git write-tree)
          if [ "$tree" = "$(git rev-parse 'origin/702^{tree}' 2>/dev/null)" ] && [ "$parent" = "$(git rev-parse 'origin/702^' 2>/dev/null)" ]; then
            echo "702: unchanged, skipping push"
          else
            commit=$(git commit-tree "$tree" -p "$parent" -m "generate 702 branch from abap2UI5 v${{ steps.version.outputs.version }}")
            git push --force origin "$commit:refs/heads/702"
          fi
