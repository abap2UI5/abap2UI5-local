name: generate_702

# Rebuilds the 702 branch via generate_branch.yaml: static files from the
# standard branch, merged sources downported with abaplint.

on:
  workflow_dispatch:
  push:
    branches: [main]
  workflow_run:
    workflows: [update_input]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: generate_702
  cancel-in-progress: false

jobs:
  generate_702:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/generate_branch.yaml
    with:
      branch: '702'
      base_branch: standard
      do_downport: true
