name: generate_cloud

# Rebuilds the cloud branch via generate_branch.yaml, linted with the
# default config.

on:
  workflow_dispatch:
  push:
    branches: [main]
  workflow_run:
    workflows: [update_input]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: generate_cloud
  cancel-in-progress: false

jobs:
  generate_cloud:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/generate_branch.yaml
    with:
      branch: cloud
      base_branch: cloud
