name: update_input

# Overwrites input/ with the current upstream abap2UI5 sources, validates the
# copy with abaplint (config abaplint.jsonc points at /input) and pushes the
# refresh to main. The three generate_* workflows then rebuild the artifact
# branches on top of the new main commit.
#
# The trigger_local workflow in abap2UI5/abap2UI5 performs the same input/
# refresh on every push to its main branch (pushed here via deploy key), so
# this repo follows upstream immediately. The monthly cron stays as a
# safety net in case an upstream-side push is lost. Both sides run the same
# script: .github/scripts/refresh_input.sh.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 1 * *'

permissions:
  contents: write

concurrency:
  group: update_input
  cancel-in-progress: false

jobs:
  update_input:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Checkout upstream abap2UI5
        run: git clone --depth 1 https://github.com/abap2UI5/abap2UI5 /tmp/abap2UI5

      - name: Refresh input, lint and push
        run: bash .github/scripts/refresh_input.sh /tmp/abap2UI5/src
