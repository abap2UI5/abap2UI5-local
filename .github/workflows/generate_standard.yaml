name: generate_standard

# Rebuilds the standard branch via generate_branch.yaml, linted with the
# abap_standard config.

on:
  workflow_dispatch:
  push:
    branches: [main]
  workflow_run:
    workflows: [update_input]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: generate_standard
  cancel-in-progress: false

jobs:
  generate_standard:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/generate_branch.yaml
    with:
      branch: standard
      base_branch: standard
      lint_config: .github/abaplint/abap_standard.jsonc
